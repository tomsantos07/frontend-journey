<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário HTML</title>
</head>
<body>
  <h1>Formulário HTML</h1>

  <form action="http://google.com/search" method="get">
    <label for="pesquisar">Pesquise no Google</label>
    <input type="text" name="q" id="pesquisar">
    <button type="submit">Pesquisar</button>
  </form>

  <!-- action é o destino, a ação que a gente quer executar e geralmente fica em uma URL
     **  
     o método GET envia os dados digitados no forms diretamente pela barra de endereço do navegador (URL)
     -->
</body>
</html>
